name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest tests/ -q

      - name: Smoke test (end-to-end pipeline)
        run: bash run_local.sh
