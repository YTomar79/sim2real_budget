# Conda environment for reproducing the experiments.
# Create with:   conda env create -f environment.yml
# Activate with: conda activate sim2real
name: sim2real
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - gymnasium>=0.29,<1.1
      - stable-baselines3>=2.3.0
      - torch>=2.1
      - numpy>=1.24
      - pandas>=2.0
      - matplotlib>=3.7
